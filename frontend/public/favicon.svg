<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">

  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#016D2D"/>

  <!-- Clip chart content to diamond shape -->
  <defs>
    <clipPath id="diamond-clip">
      <polygon points="32,11 53,32 32,53 11,32"/>
    </clipPath>
  </defs>

  <!-- Subtle inner diamond fill (depth) -->
  <polygon points="32,18 46,32 32,46 18,32" fill="white" opacity="0.08"/>

  <!-- Chart bars + trend line clipped inside diamond -->
  <g clip-path="url(#diamond-clip)">
    <!-- Rising bars -->
    <rect x="18" y="37" width="8" height="16" rx="1.5" fill="white" opacity="0.55"/>
    <rect x="28" y="27" width="8" height="26" rx="1.5" fill="white" opacity="0.78"/>
    <rect x="38" y="19" width="8" height="34" rx="1.5" fill="white" opacity="0.95"/>

    <!-- Trend line over the bars -->
    <polyline points="22,35 32,25 42,17"
              fill="none" stroke="#7FE0A8" stroke-width="2.5"
              stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Dot at peak -->
    <circle cx="42" cy="17" r="3" fill="#7FE0A8"/>
  </g>

  <!-- Diamond frame drawn on top so edges are crisp -->
  <polygon points="32,11 53,32 32,53 11,32"
           fill="none" stroke="white" stroke-width="2.5"/>

</svg>
