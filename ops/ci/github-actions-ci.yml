name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (PHP)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_sqlite, sqlite3, mbstring, bcmath, intl
          coverage: none

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env || true
          php artisan key:generate

      - name: Lint (Pint) — non-blocking until the codebase is formatted
        continue-on-error: true
        run: ./vendor/bin/pint --test

      - name: Run tests
        run: php artisan test

  frontend:
    name: Frontend (Vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  secret-scan:
    name: Secret & DB-file guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fail if a database file is committed
        run: |
          if git ls-files | grep -E '\.(db|sqlite|sqlite3)$'; then
            echo "::error::A database file is tracked in git. Databases must never be versioned."
            exit 1
          fi
          echo "No database files tracked. OK."
